server:
  http_listen_port: 9080

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://server-database:3100/loki/api/v1/push

scrape_configs:
  - job_name: ppc

    static_configs:
      - targets:
          - localhost
        labels:
          job: ppc
          host: ${SITE_NAME}
          __path__: /var/log/ppc/*.log
