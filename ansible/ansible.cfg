[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml

[ssh_connection]
# Tailscale expose chaque edge via son MagicDNS (ex: edge-site-01.tailnet.ts.net)
# ou directement par nom court si MagicDNS est activé.
# SSH standard sur l'IP / nom Tailscale — pas besoin de ssh_executable spécial.
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
